<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Preconnect to third-party origins on the critical path to save ~100-300ms of connection setup -->
    <link rel="preconnect" href="https://cdn.gpteng.co" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.gpteng.co" />

    <!-- Modulepreload entry script: shortens critical request chain by letting the browser
         discover & fetch the main JS in parallel with HTML parsing. Vite rewrites this to
         the hashed asset URL at build time. -->
    <link rel="modulepreload" href="/src/main.tsx" />

    <!-- LCP hero images are bundled with hashes; eager-loaded in ShuffleDeck.tsx -->

    <title>The Unlearning School for AI Training for Non-Tech Teams</title>
    <meta name="description" content="AI Training, Workshops and Events for AI adoption. We redesign workflows so non-technical teams actually use the AI tools that companies pay and aren&#39;t used.">
    <meta name="author" content="The Unlearning School" />
    <meta name="keywords" content="AI adoption, AI training, EU AI Act, Copilot adoption, AI for non-technical teams, workflow redesign, AI literacy, change management, Romania, EU" />
    <meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1" />
    <link rel="canonical" href="https://tuslast.lovable.app/" />

    <!-- Geo (GEO) -->
    <meta name="geo.region" content="RO" />
    <meta name="geo.placename" content="Bucharest" />
    <meta name="ICBM" content="44.4268,26.1025" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Unlearning School" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:url" content="https://tuslast.lovable.app/" />
    
    
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/IdBYduUEeXhnKxF1hWuwXOkQoAk1/social-images/social-1776502775834-ai_for_non_technical_16-9.webp">
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="The Unlearning School — AI Adoption Training" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    
    
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/IdBYduUEeXhnKxF1hWuwXOkQoAk1/social-images/social-1776502775834-ai_for_non_technical_16-9.webp">

    <!-- Organization JSON-LD (AEO + brand graph) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "The Unlearning School",
      "alternateName": "TUS",
      "url": "https://tuslast.lovable.app/",
      "logo": "https://tuslast.lovable.app/favicon.ico",
      "description": "Behaviour change practice for AI adoption in non-technical teams. EU AI Act Article 4 ready training.",
      "founder": { "@type": "Person", "name": "Răzvan Vâlceanu" },
      "areaServed": ["RO", "EU"],
      "address": { "@type": "PostalAddress", "addressCountry": "RO", "addressLocality": "Bucharest" },
      "sameAs": [
        "https://www.linkedin.com/company/the-unlearning-school"
      ]
    }
    </script>

    <!-- WebSite JSON-LD with SearchAction (AEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "The Unlearning School",
      "url": "https://tuslast.lovable.app/",
      "inLanguage": "en"
    }
    </script>
    <meta property="og:title" content="The Unlearning School for AI Training for Non-Tech Teams">
  <meta name="twitter:title" content="The Unlearning School for AI Training for Non-Tech Teams">
  <meta property="og:description" content="AI Training, Workshops and Events for AI adoption. We redesign workflows so non-technical teams actually use the AI tools that companies pay and aren&#39;t used.">
  <meta name="twitter:description" content="AI Training, Workshops and Events for AI adoption. We redesign workflows so non-technical teams actually use the AI tools that companies pay and aren&#39;t used.">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
